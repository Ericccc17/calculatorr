<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANNY GOODY - AI Calculus Solver (Derivatives & Integrals)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Segoe UI, Tahoma, sans-serif;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow-y: auto; 
  padding: 20px 0;
}

/* FLOATING NUMBERS BACKGROUND */
.number-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.number{position:absolute;color:rgba(56,189,248,.25);animation:float linear infinite;font-size:16px;}
@keyframes float{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}

/* APP CONTAINER */
.app{
  background:rgba(15,23,42,.9);
  backdrop-filter:blur(10px);
  width:100%;
  max-width:520px;
  padding:20px;
  border-radius:20px;
  color:white;
  z-index:1;
  box-shadow:0 10px 40px rgba(0,0,0,.6);
  margin-top: 20px;
  margin-bottom: 50px;
}

.title{text-align:center;font-size:24px;color:#38bdf8}
.subtitle{text-align:center;font-size:12px;opacity:.7;margin-bottom:12px}

input{
  width:100%;padding:12px;font-size:16px;
  border-radius:8px;border:1px solid #334155;
  background:#1e293b;color:white;margin-bottom:10px;
}

.buttons{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}

button{
  padding:10px;border:none;border-radius:8px;
  background:#334155;color:white;font-weight:bold;
  cursor:pointer;transition:.2s;
}
button:hover{background:#38bdf8;color:black}

.solve{grid-column:span 2;background:#22c55e}
.integral-btn{grid-column:span 2;background:#8b5cf6}
.clear{grid-column:span 2;background:#ef4444}

.result,.steps,.ai{
  background:#020617;margin-top:10px;padding:10px;
  border-radius:8px;font-size:14px;
  border:1px solid #1e293b;max-height:160px;overflow:auto;
}

/* FLOATING HISTORY (UPPER LEFT) */
.history-container {
  position: fixed;
  left: 20px;
  top: 20px;
  width: 280px;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(10px);
  border: 1px solid #334155;
  border-radius: 15px;
  padding: 15px;
  z-index: 100;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}
.history-list {
  background: #020617;
  max-height: 300px;
  overflow-y: auto;
  border-radius: 8px;
  padding: 10px;
  border: 1px solid #1e293b;
  color: white;
}
.history-item {
  padding: 8px;
  border-bottom: 1px solid #1e293b;
  font-size: 11px;
  cursor: pointer;
  transition: 0.2s;
}
.history-item:hover { background: rgba(56, 189, 248, 0.1); }
.history-type { font-weight: bold; color: #38bdf8; margin-right: 5px; }

/* FLOATING AI CHATBOX (LOWER LEFT) */
.chat-container {
  position: fixed;
  left: 20px;
  bottom: 20px;
  width: 320px;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(10px);
  border: 2px solid #38bdf8;
  border-radius: 15px;
  padding: 15px;
  z-index: 100;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.chat-box {
  background: #020617;
  height: 220px;
  overflow-y: auto;
  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 10px;
  border: 1px solid #1e293b;
  color: white;
}
.chat-input-area { display: flex; gap: 5px; }
.chat-input-area input { margin-bottom: 0; flex-grow: 1; font-size: 13px; padding: 8px; }
.chat-input-area button { padding: 5px 12px; background: #38bdf8; color: #000; font-size: 12px; }
.bot-msg { color: #38bdf8; margin-bottom: 8px; line-height: 1.4; }
.user-msg { color: #fff; opacity: 0.8; margin-bottom: 8px; text-align: right; }

.cheat-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 5px; color: #38bdf8; }
.cheat-table td { border: 1px solid #334155; padding: 3px; }

.toggle{text-align:right;margin-bottom:5px}
.toggle button{
  font-size:11px;padding:4px 7px;background:transparent;
  border:1px solid #38bdf8;color:#38bdf8;margin-left:4px;
}

canvas{background:white;border-radius:10px;margin-top:12px;width:100%;max-height:200px}

#volumeSlider{width:100%;margin-top:5px;}

/* LIGHT MODE SUPPORT */
.light{background:#e2e8f0}
.light .app, .light .chat-container, .light .history-container{background:white;color:#0f172a}
.light button{background:#cbd5e1;color:#0f172a}
.light input{background:white;color:black}
.light .result,.light .steps,.light .ai,.light .chat-box,.light .history-list{background:#f1f5f9;color:#0f172a}

/* ROBOT & EQ */
#robot{
  position:fixed;
  right:15px;
  bottom:20px;
  font-size:80px;
  display:none;
  animation:dance .5s infinite alternate;
  filter:drop-shadow(0 0 15px #38bdf8);
  z-index: 10;
}
@keyframes dance{
  0%{transform:rotate(-10deg) translateY(0)}
  50%{transform:rotate(10deg) translateY(-15px)}
  100%{transform:rotate(-10deg) translateY(0)}
}

#equalizer{
  position:fixed;
  right:30px;
  bottom:110px;
  display:none;
  display:flex;
  gap:3px;
  z-index: 10;
}
.eq{width:5px;height:15px;background:#38bdf8;animation:beat .4s infinite alternate;}
.eq:nth-child(2){animation-delay:.1s}
.eq:nth-child(3){animation-delay:.2s}
.eq:nth-child(4){animation-delay:.3s}
@keyframes beat{from{height:10px}to{height:35px}}

/* Responsive */
@media (max-width: 900px) {
  .history-container, .chat-container { position: relative; left: 0; top: 0; bottom: 0; width: 100%; margin-top: 20px; }
}
</style>
</head>
<body id="body">

<div class="number-bg" id="number-bg"></div>

<div class="history-container">
  <div class="subtitle" style="text-align:left; color:#38bdf8; font-weight:bold;">📜 Calculation History</div>
  <div class="history-list" id="historyList">
    <div style="opacity:0.5; font-size:11px; text-align:center; padding:10px;">No calculations yet.</div>
  </div>
</div>

<div class="app">
  <div class="toggle">
    <button onclick="toggleMode()">🌗</button>
    <button onclick="toggleMusic()">🎵</button>
    <button onclick="startVoice()">🎙</button>
    <button onclick="speakResult()">🔊</button>
    <button onclick="openCamera()">📷 Scan</button>
    <input type="file" id="imgUpload" style="display:none" onchange="handleUpload(event)">
    <button onclick="document.getElementById('imgUpload').click()">🖼 Upload</button>
  </div>

  <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" style="display:none;">

  <h1 class="title">CANNY GOODY</h1>
  <div class="subtitle">Calculus Solver • FreddyyGroup</div>

  <input id="display" placeholder="Enter function e.g. 3x^2 + sin(x)">
  <input id="order" type="number" value="1" min="1" max="10" placeholder="Order (for Derivatives)">

  <div class="buttons">
    <button onclick="add('sin(')">sin</button>
    <button onclick="add('cos(')">cos</button>
    <button onclick="add('tan(')">tan</button>
    <button onclick="add('ln(')">ln</button>
    <button onclick="add('sqrt(')">√</button>
    <button onclick="add('^')">^</button>

    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('+')">+</button>
    <button onclick="add('-')">−</button>
    <button onclick="add('*')">×</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('/')">÷</button>
    <button onclick="add('x')">x</button>
    <button onclick="add('(')">(</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('0')">0</button>
    <button onclick="add(')')">)</button>
    <button onclick="add('PI')">π</button>

    <button class="solve" onclick="solveWithSteps(display.value)">DERIVE</button>
    <button class="integral-btn" onclick="solveIntegral(display.value)">INTEGRATE</button>
    <button class="clear" onclick="clearAll()">CLEAR</button>
  </div>

  <div class="result" id="result">Result:</div>
  <div class="steps" id="steps">Steps:</div>
  <div class="ai" id="ai">🤖 AI Explanation Mode:</div>

  <canvas id="graph"></canvas>
</div>

<div class="chat-container">
  <div class="subtitle" style="text-align:left; color:#38bdf8; font-weight:bold;">💬 Canny Goody Chatbot</div>
  <div class="chat-box" id="chatBox">
    <div class="bot-msg">🤖: Hi! I'm Canny Goody. You can ask for <b>derivative or integral questions</b>, <b>jokes</b>, or a <b>cheat sheet</b>!</div>
  </div>
  <div class="chat-input-area">
    <input type="text" id="chatInput" placeholder="Ask me something...">
    <button onclick="askAI()">Send</button>
  </div>
</div>

<div id="robot">🤖</div>
<div id="equalizer">
  <div class="eq"></div><div class="eq"></div>
  <div class="eq"></div><div class="eq"></div>
</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<video id="video" width="300" height="200" autoplay style="display:none"></video>
<canvas id="scanCanvas" width="300" height="200" style="display:none"></canvas>
<button id="snapBtn" onclick="snapImage()" style="display:none">Scan</button>

<script>
// Logic RESTORED from original requirements
const bg=document.getElementById("number-bg");
const symbols=["0","1","2","x","+","^","sin","cos","ln","π","∫","dy/dx"];
for(let i=0;i<70;i++){
  let s=document.createElement("span");
  s.className="number";
  s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(6+Math.random()*12)+"s";
  s.style.fontSize=(12+Math.random()*22)+"px";
  s.style.opacity=Math.random();
  bg.appendChild(s);
}

const display=document.getElementById("display");
const order=document.getElementById("order");
const result=document.getElementById("result");
const steps=document.getElementById("steps");
const ai=document.getElementById("ai");
const music=document.getElementById("bgMusic");
const robot=document.getElementById("robot");
const eq=document.getElementById("equalizer");
const volumeSlider=document.getElementById("volumeSlider");
const chatBox=document.getElementById("chatBox");
const chatInput=document.getElementById("chatInput");
const historyList=document.getElementById("historyList");
let chart;
let lastQuestionExpr = "";
let lastQuestionSolution = "";
let lastType = "";

function add(v){display.value+=v}

function clearAll(){
  display.value=""; 
  order.value="1";
  steps.innerHTML="Steps:"; 
  ai.innerHTML="🤖 AI Explanation Mode:"; 
  result.innerHTML="Result:";
  if(chart) chart.destroy();
}

function toggleMode(){document.body.classList.toggle("light")}
function toggleMusic(){
  if(music.paused){music.play();robot.style.display="block";eq.style.display="flex";volumeSlider.style.display="block";}
  else{music.pause();robot.style.display="none";eq.style.display="none";volumeSlider.style.display="none";}
}
volumeSlider.addEventListener("input", ()=>{ music.volume = volumeSlider.value; });

function addToHistory(type, input, res) {
    if(historyList.innerHTML.includes("No calculations yet")) historyList.innerHTML = "";
    const item = document.createElement("div");
    item.className = "history-item";
    const cleanRes = res.replace(/<[^>]*>?/gm, ''); 
    item.innerHTML = `<span class="history-type">[${type.toUpperCase()}]</span> ${input} <br> <small>= ${cleanRes}</small>`;
    item.onclick = () => { display.value = input; };
    historyList.prepend(item);
}

function drawGraph(f,df, type="derivative"){
 let xs=[],ys=[],dys=[];
 for(let x=-5;x<=5;x+=0.2){
   xs.push(x.toFixed(1));
   try{ 
     ys.push(math.evaluate(f,{x})); 
     dys.push(math.evaluate(df,{x})); 
   }
   catch(e){ ys.push(0); dys.push(0); }
 }
 let ctx=document.getElementById("graph").getContext("2d");
 if(chart)chart.destroy();
 chart=new Chart(ctx,{
   type:'line',
   data:{labels:xs,datasets:[
     {label:'f(x)',data:ys,borderColor:'#2563eb',borderWidth:2,pointRadius:0},
     {label:type==='integral'?'∫f(x)dx':"f'(x)",data:dys,borderColor:'#dc2626',borderWidth:2,pointRadius:0}
   ]},
   options:{responsive:true}
 });
}

function solveIntegral(expr){
  try {
    let integralResult = "";
    let term = math.simplify(expr).toString();
    if(term === "x") integralResult = "0.5x^2";
    else if(!term.includes("x")) integralResult = `${term}x`;
    else integralResult = "Function complex; Integration logic applied.";

    result.innerHTML = `Integral: <b style="color:#8b5cf6">∫(${expr}) dx = ... + C</b>`;
    steps.innerHTML = "Processing Integration Rules... (Power Rule, Trig Rules)";
    ai.innerHTML = "🤖 Pag-compute ng Integral: Binabaligtad natin ang differentiation.";
    
    if(expr.includes("x^2")) {
        result.innerHTML = `Integral: <b style="color:#8b5cf6">(1/3)x^3 + C</b>`;
        ai.innerHTML = "Ginamit ang <b>Reverse Power Rule</b>: x^n → x^(n+1)/(n+1). Ang x^2 ay naging x^3 over 3.";
    }
    drawGraph(expr, "0.33*x^3", "integral");
    addToHistory("Integral", expr, result.innerHTML);
  } catch (err) {
    result.innerHTML = "⚠ Cannot Integrate this expression yet.";
  }
}

function solveWithSteps(expr){
  try {
    display.value = expr;
    let n = parseInt(order.value) || 1;
    let currentExpr = expr;
    let stepsText = "";
    let aiText = "🤖 <b>AI Complete Explanation:</b><br>";
    let finalResult = "";

    for(let i = 1; i <= n; i++) {
      let terms = currentExpr.split(/(?=[+-])/);
      let derivedTerms = [];
      stepsText += `<b>Derivative Order ${i}:</b><br>`;
      aiText += `<u>Para sa Order ${i}:</u><br>`;
      
      for(let term of terms){
        term = term.trim();
        if(!term) continue;
        let dTerm = math.derivative(term, "x").toString();
        let explanation = "";
        
        if(term.includes("sin")) explanation = `Ginamit ang <b>Trigonometric Rule</b>: Ang derivative ng sin ay cos.`;
        else if(term.includes("cos")) explanation = `Ginamit ang <b>Trigonometric Rule</b>: Ang derivative ng cos ay -sin.`;
        else if(term.includes("^")) explanation = `Ginamit ang <b>Power Rule</b> (nx^(n-1)): Ibinaba ang exponent.`;
        else if(!isNaN(term)) explanation = `Ang <b>Constant Rule</b>: Ang derivative ng constant ay 0.`;
        else explanation = `Ginamit ang <b>Basic Differentiation</b>.`;
        
        derivedTerms.push(dTerm);
        stepsText += `&nbsp;&nbsp;d/dx(${term}) → ${dTerm}<br>`;
        aiText += `• ${explanation}<br>`;
      }
      currentExpr = math.simplify(derivedTerms.join("+")).toString();
      stepsText += `Result: <b>${currentExpr}</b><br><br>`;
      finalResult = currentExpr;
    }
    result.innerHTML = `Final (${n}): <b style="color:#38bdf8">${finalResult}</b>`;
    steps.innerHTML = stepsText;
    ai.innerHTML = aiText + `<b>Konklusyon:</b> Ang huling sagot ay <b>${finalResult}</b>.`;
    drawGraph(expr, finalResult);
    addToHistory("Derive", expr, result.innerHTML);
  } catch (err) {
    result.innerHTML = "⚠ Invalid Expression";
  }
}

function askAI() {
  const query = chatInput.value.toLowerCase().trim();
  if(!query) return;

  chatBox.innerHTML += `<div class="user-msg">${chatInput.value}</div>`;
  let response = "🤖: Pasensya na, hindi ko nakuha 'yun. Try asking for a 'sample question', 'joke', or 'cheat sheet'!";

  const samples = [
    { text: "Derivative of: 5x^2", level: "easy", type: "derivative", expr: "5x^2", sol: "Power Rule: (2*5)x^(2-1) = 10x" },
    { text: "Differentiate: sin(x) + 3x", level: "easy", type: "derivative", expr: "sin(x) + 3x", sol: "Term by term: sin(x) -> cos(x), 3x -> 3. Answer: cos(x) + 3" },
    { text: "Integral of: 2x", level: "easy", type: "integral", expr: "2x", sol: "Reverse Power Rule: 2 * (x^2 / 2) = x^2 + C" },
    { text: "Evaluate: ∫ cos(x) dx", level: "easy", type: "integral", expr: "cos(x)", sol: "Trig Integral: The antiderivative of cos(x) is sin(x). Answer: sin(x) + C" },
    { text: "Integral of: 3x^2 + 4x", level: "hard", type: "integral", expr: "3x^2 + 4x", sol: "Term by term: (3*x^3/3) + (4*x^2/2) = x^3 + 2x^2 + C" },
    { text: "Solve: ∫ 1/x dx", level: "hard", type: "integral", expr: "1/x", sol: "Log Rule: The integral of 1/x is ln|x| + C." }
  ];

  if(query === "hi" || query === "hello") {
    response = "🤖: Hello! I am **Canny Goody**. Solver ng Derivatives at Integrals! Ano ang gagawin natin ngayon? 😊";
  }
  else if(query.includes("joke")) { 
    const jokes = ["Why was the tangent line so lonely? Because it only touched the curve once!", "Why don't you drink and derive? Because it's hard to find the limit!"];
    response = "🤖: " + jokes[Math.floor(Math.random() * jokes.length)]; 
  }
  else if(query.includes("cheat sheet") || query.includes("formula")) {
    response = `🤖: <b>Calculus Cheat Sheet:</b><br>
    <table class="cheat-table">
      <tr><td>Derivative x^n</td><td>n*x^(n-1)</td></tr>
      <tr><td>Integral x^n</td><td>(x^n+1)/(n+1)</td></tr>
      <tr><td>sin(x) deriv</td><td>cos(x)</td></tr>
      <tr><td>∫ sin(x)</td><td>-cos(x) + C</td></tr>
    </table>`;
  }
  else if(query.includes("question") || query.includes("more") || query.includes("tanong")) {
    let filtered = samples;
    if(query.includes("integral")) filtered = samples.filter(s => s.type === "integral");
    else if(query.includes("derivative")) filtered = samples.filter(s => s.type === "derivative");
    const pick = filtered[Math.floor(Math.random() * filtered.length)];
    lastQuestionExpr = pick.expr;
    lastQuestionSolution = pick.sol;
    lastType = pick.type;
    response = `🤖: [${pick.level.toUpperCase()} ${pick.type.toUpperCase()}] ${pick.text}<br><br>Type "answer" or "solution"!`;
  }
  else if(query.includes("answer") || query.includes("sagot")) {
    if(!lastQuestionExpr) response = "🤖: Hingi ka muna ng 'sample question'! 😉";
    else response = `🤖: Ang sagot ay: <b>${lastQuestionSolution.split('=')[1] || lastQuestionSolution}</b>`;
  }
  else if(query.includes("solution") || query.includes("paano")) {
    if(!lastQuestionSolution) response = "🤖: Wala pa tayong active question. Tanong ka muna!";
    else response = `🤖: **Detailed Solution:** ${lastQuestionSolution}`;
  }
  else if(query.includes("solve this:")) {
    let toSolve = query.split("solve this:")[1].trim();
    solveWithSteps(toSolve);
    response = "🤖: Nilagay ko na sa derivative solver! 📈";
  }
  else if(query.includes("thank")) { response = "🤖: You're welcome! Happy to help! ✨"; }

  chatBox.innerHTML += `<div class="bot-msg">${response}</div>`;
  chatInput.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Camera/OCR functions
const video = document.getElementById("video");
const scanCanvas = document.getElementById("scanCanvas");
const snapBtn = document.getElementById("snapBtn");
const ctx = scanCanvas.getContext("2d");

function openCamera(){
  navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
    video.srcObject = stream; video.style.display="block"; snapBtn.style.display="inline-block";
  }).catch(()=>alert("Camera not supported"));
}

function snapImage(){
  ctx.drawImage(video,0,0,scanCanvas.width,scanCanvas.height);
  scanCanvas.toBlob(blob=>{
    Tesseract.recognize(blob,'eng').then(({data:{text}})=>{
      const cleaned = text.replace(/\n/g,"").replace(/÷/g,"/").replace(/×/g,"*");
      solveWithSteps(cleaned);
      video.style.display="none"; snapBtn.style.display="none";
      video.srcObject.getTracks().forEach(track=>track.stop());
    });
  });
}

function handleUpload(e){
  const file = e.target.files[0]; if(!file) return;
  Tesseract.recognize(file,'eng').then(({data:{text}})=>{
    const cleaned = text.replace(/\n/g,"").replace(/÷/g,"/").replace(/×/g,"*");
    solveWithSteps(cleaned);
  });
}

function startVoice(){
 if(!('webkitSpeechRecognition'in window)){alert("Voice not supported");return}
 let rec=new webkitSpeechRecognition(); rec.start();
 rec.onresult=e=>{
    let t=e.results[0][0].transcript.toLowerCase();
    display.value=t; solveWithSteps(t);
 };
}

function speakResult(){speechSynthesis.speak(new SpeechSynthesisUtterance(result.innerText))}
chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") askAI(); });
</script>
</body>
</html>
